<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #58a6ff, #79c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #8b949e;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 40px;
    }

    .search-box input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1.1rem;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
    }

    .search-box input::placeholder {
      color: #484f58;
      text-transform: none;
    }

    .search-box input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }

    .search-box button {
      background: #238636;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-box button:hover { background: #2ea043; }
    .search-box button:active { background: #1a6e2a; }

    #result {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .stock-symbol {
      font-size: 1.8rem;
      font-weight: 800;
      color: #58a6ff;
    }

    .stock-name {
      font-size: 0.85rem;
      color: #8b949e;
      margin-top: 2px;
    }

    .stock-price {
      text-align: right;
    }

    .price-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .price-change {
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .up   { color: #3fb950; }
    .down { color: #f85149; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: #0d1117;
      border-radius: 10px;
      padding: 12px 16px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 600;
    }

    .error-card {
      background: #1f1117;
      border: 1px solid #6e1a1a;
      border-radius: 16px;
      padding: 20px 28px;
      color: #f85149;
      text-align: center;
    }

    .loading {
      text-align: center;
      color: #8b949e;
      padding: 30px;
      font-size: 1rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .history {
      width: 100%;
      max-width: 600px;
      margin-top: 10px;
    }

    .history-title {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #8b949e;
    }

    .chip:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>

  <h1>📈 Stock Tracker</h1>
  <p class="subtitle">Inserisci un ticker azionario per vedere i dati in tempo reale</p>

  <div class="search-box">
    <input
      type="text"
      id="tickerInput"
      placeholder="Es. AAPL, TSLA, NVDA, AMZN..."
      autocomplete="off"
    />
    <button onclick="searchStock()">Cerca</button>
  </div>

  <div id="result"></div>

  <div class="history" id="historySection" style="display:none">
    <div class="history-title">Ricerche recenti</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <script>
    const input = document.getElementById('tickerInput');
    const resultDiv = document.getElementById('result');
    let history = JSON.parse(localStorage.getItem('stockHistory') || '[]');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') searchStock();
    });

    renderHistory();

    async function searchStock() {
      const ticker = input.value.trim().toUpperCase();
      if (!ticker) return;

      resultDiv.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          Caricamento dati per <strong>${ticker}</strong>...
        </div>`;

      try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        const data = await res.json();

        const meta = data?.chart?.result?.[0]?.meta;
        if (!meta) throw new Error('Ticker non trovato');

        const price     = meta.regularMarketPrice;
        const prevClose = meta.chartPreviousClose || meta.previousClose;
        const change    = price - prevClose;
        const changePct = (change / prevClose) * 100;
        const isUp      = change >= 0;

        const high  = meta.regularMarketDayHigh  || '—';
        const low   = meta.regularMarketDayLow   || '—';
        const vol   = meta.regularMarketVolume
                      ? (meta.regularMarketVolume / 1_000_000).toFixed(2) + 'M'
                      : '—';
        const mktCap = meta.marketCap
                      ? '$' + (meta.marketCap / 1_000_000_000).toFixed(2) + 'B'
                      : '—';
        const currency = meta.currency || 'USD';
        const exchange = meta.exchangeName || '';
        const name     = meta.shortName || ticker;

        resultDiv.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="stock-symbol">${ticker}</div>
                <div class="stock-name">${name} · ${exchange}</div>
              </div>
              <div class="stock-price">
                <div class="price-value">${currency} ${price.toFixed(2)}</div>
                <div class="price-change ${isUp ? 'up' : 'down'}">
                  ${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)} (${Math.abs(changePct).toFixed(2)}%)
                </div>
              </div>
            </div>
            <div class="stats">
              <div class="stat">
                <div class="stat-label">Apertura precedente</div>
                <div class="stat-value">${prevClose.toFixed(2)}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Volume</div>
                <div class="stat-value">${vol}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Max giornaliero</div>
                <div class="stat-value up">${typeof high === 'number' ? high.toFixed(2) : high}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Min giornaliero</div>
                <div class="stat-value down">${typeof low === 'number' ? low.toFixed(2) : low}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value">${mktCap}</div>
              </div>
              <div class="stat">
                <div class="stat-label">Valuta</div>
                <div class="stat-value">${currency}</div>
              </div>
            </div>
          </div>`;

        addToHistory(ticker);

      } catch (err) {
        resultDiv.innerHTML = `
          <div class="error-card">
            ❌ Ticker <strong>${ticker}</strong> non trovato o errore di rete.<br>
            <small style="color:#8b949e;margin-top:6px;display:block">Verifica il simbolo e riprova.</small>
          </div>`;
      }
    }

    function addToHistory(ticker) {
      history = [ticker, ...history.filter(t => t !== ticker)].slice(0, 8);
      localStorage.setItem('stockHistory', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const chips   = document.getElementById('historyChips');
      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      chips.innerHTML = history.map(t =>
        `<span class="chip" onclick="input.value='${t}';searchStock()">${t}</span>`
      ).join('');
    }
  </script>
</body>
</html>
